<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-менеджер задач</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-over {
            border: 2px dashed #4f46e5;
            background-color: #f5f3ff;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                TaskFlow <span class="text-sm font-normal text-gray-500">Менеджер задач</span>
            </h1>
            <button id="btnAddTask" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors shadow">
                + Добавить задачу
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-8 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Приоритет</label>
                    <select id="filterPriority" class="border border-gray-300 rounded-md p-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="all">Все</option>
                        <option value="low">Низкий</option>
                        <option value="medium">Средний</option>
                        <option value="high">Высокий</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Поиск</label>
                    <input type="text" id="searchBar" placeholder="Поиск по названию..." class="border border-gray-300 rounded-md p-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div class="text-sm text-gray-500 font-medium" id="taskCounter">Всего задач: 0</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-gray-100 p-4 rounded-lg flex flex-col min-h-[500px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-700 uppercase text-sm tracking-wider flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
                        К выполнению
                    </h2>
                    <span id="countTodo" class="bg-gray-200 text-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>
                </div>
                <div id="colTodo" data-status="todo" class="task-column flex-grow space-y-4 transition-all duration-200"></div>
            </div>

            <div class="bg-gray-100 p-4 rounded-lg flex flex-col min-h-[500px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-700 uppercase text-sm tracking-wider flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                        В процессе
                    </h2>
                    <span id="countInProgress" class="bg-gray-200 text-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>
                </div>
                <div id="colInProgress" data-status="in_progress" class="task-column flex-grow space-y-4 transition-all duration-200"></div>
            </div>

            <div class="bg-gray-100 p-4 rounded-lg flex flex-col min-h-[500px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-700 uppercase text-sm tracking-wider flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-green-500"></span>
                        Выполнено
                    </h2>
                    <span id="countDone" class="bg-gray-200 text-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>
                </div>
                <div id="colDone" data-status="done" class="task-column flex-grow space-y-4 transition-all duration-200"></div>
            </div>

        </div>
    </main>

    <div id="taskModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Создать задачу</h3>
                <button id="btnCloseModal" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="taskForm" class="p-6 space-y-4">
                <input type="hidden" id="taskId">
                
                <div>
                    <label for="inputTitle" class="block text-sm font-medium text-gray-700 mb-1">Название *</label>
                    <input type="text" id="inputTitle" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
                </div>

                <div>
                    <label for="inputDesc" class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
                    <textarea id="inputDesc" rows="3" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="selectPriority" class="block text-sm font-medium text-gray-700 mb-1">Приоритет</label>
                        <select id="selectPriority" class="w-full border border-gray-300 rounded-md p-2 bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
                            <option value="low">Низкий</option>
                            <option value="medium" selected>Средний</option>
                            <option value="high">Высокий</option>
                        </select>
                    </div>
                    <div>
                        <label for="inputDate" class="block text-sm font-medium text-gray-700 mb-1">Срок сдачи</label>
                        <input type="date" id="inputDate" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
                    </div>
                </div>

                <div id="statusGroup" class="hidden">
                    <label for="selectStatus" class="block text-sm font-medium text-gray-700 mb-1">Статус</label>
                    <select id="selectStatus" class="w-full border border-gray-300 rounded-md p-2 bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
                        <option value="todo">К выполнению</option>
                        <option value="in_progress">В процессе</option>
                        <option value="done">Выполнено</option>
                    </select>
                </div>

                <div class="pt-4 border-t border-gray-150 flex justify-end gap-3">
                    <button type="button" id="btnCancel" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none">
                        Отмена
                    </button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md text-sm font-medium shadow-sm focus:outline-none">
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
